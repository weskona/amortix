name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    name: Build and attach release ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          jq --arg version "$version" '.version = $version' \
            custom_components/amortix/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/amortix/manifest.json
          echo "manifest version set to $version"

      - name: Create ZIP
        run: |
          cd custom_components/amortix
          zip -r amortix.zip ./*

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: custom_components/amortix/amortix.zip
